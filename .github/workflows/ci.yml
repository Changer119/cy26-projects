name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: loop-engineering-demo
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8
      - name: Setup
        run: bash scripts/setup.sh
      - name: CI gate (lint + test)
        run: bash scripts/ci.sh

name: Update README

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update README
        run: README_PATH="$GITHUB_WORKSPACE/README.md" bash 06-github-action-demo/scripts/update-readme.sh

      - name: Commit changes
        run: |
          if git diff --quiet README.md; then
            echo "README.md has no changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore: update README"
          git push

name: Deploy AI Team Transformation Slides

on:
  push:
    branches:
      - main
    paths:
      - "0711-AI技术研讨/docs/ai-team-transformation.md"
      - "0711-AI技术研讨/slides/ai-team-transformation.html"
      - "0711-AI技术研讨/scripts/build-pages.sh"
      - ".github/workflows/pages-ai-team.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build static site
        run: bash "0711-AI技术研讨/scripts/build-pages.sh"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "0711-AI技术研讨/dist/pages"

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
